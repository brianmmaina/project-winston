server {
    listen       5173;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # ----- security + ergonomics -----
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ----- compression -----
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_types         text/plain text/css application/javascript application/json
                       application/xml application/octet-stream image/svg+xml font/woff2;

    # ----- API reverse proxy -----
    # The frontend talks to the backend at /api/* through nginx so that browsers
    # only ever speak to one origin. Set ``VITE_API_URL=""`` (the default in
    # docker-compose.yml) so the client emits relative URLs.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Health passthrough (handy for uptime checks).
    location = /health {
        proxy_pass         http://backend:8000/health;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ----- long-cache hashed assets -----
    location /assets/ {
        try_files $uri =404;
        expires    30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ----- SPA fallback -----
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ----- container healthcheck -----
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
